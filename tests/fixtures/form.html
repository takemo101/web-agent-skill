<!doctype html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>フォームテスト</title>
	</head>
	<body>
		<header aria-label="ヘッダー">
			<h1>フォームページ</h1>
			<nav>
				<a href="#home" id="home-link">ホーム</a>
				<a href="#header-settings" id="header-settings-link">設定</a>
			</nav>
		</header>

		<main>
			<section aria-label="商品情報">
				<h2>商品情報</h2>
				<p>商品名: テスト商品</p>
				<p>価格: ¥1,000</p>
			</section>

			<section aria-label="入力フォーム">
				<h2>お問い合わせ</h2>
				<form>
					<div>
						<label for="name">名前</label>
						<input id="name" name="name" type="text" />
					</div>
					<div>
						<label for="email">メールアドレス</label>
						<input id="email" name="email" type="email" placeholder="メールアドレスを入力" />
					</div>
					<div>
						<label for="message">メッセージ</label>
						<textarea id="message" name="message"></textarea>
					</div>
					<div>
						<label for="country">国</label>
						<select id="country" name="country">
							<option value="">選択してください</option>
							<option value="日本">日本</option>
							<option value="アメリカ">アメリカ</option>
							<option value="イギリス">イギリス</option>
						</select>
					</div>
					<div>
						<label>
							<input id="agreement" type="checkbox" name="agreement" />
							利用規約に同意
						</label>
					</div>
					<div>
						<button id="submit-main" type="button">送信</button>
						<button id="cancel" type="button">キャンセル</button>
						<button id="submit-secondary" type="button">送信</button>
						<a href="#help" id="help-link">ヘルプ</a>
					</div>
				</form>
			</section>

			<aside aria-label="サイドバー">
				<h2>サイドバー</h2>
				<a href="#sidebar-settings" id="sidebar-settings-link">設定</a>
			</aside>

			<p id="action-log">未操作</p>
		</main>

		<script>
			const actionLog = document.getElementById("action-log");
			const submitMain = document.getElementById("submit-main");
			const cancel = document.getElementById("cancel");
			const headerSettings = document.getElementById("header-settings-link");
			const sidebarSettings = document.getElementById("sidebar-settings-link");
			submitMain?.addEventListener("click", () => {
				actionLog.textContent = "送信ボタンをクリック";
			});
			cancel?.addEventListener("click", () => {
				actionLog.textContent = "キャンセルボタンをクリック";
			});
			headerSettings?.addEventListener("click", (event) => {
				event.preventDefault();
				actionLog.textContent = "ヘッダー設定をクリック";
			});
			sidebarSettings?.addEventListener("click", (event) => {
				event.preventDefault();
				actionLog.textContent = "サイドバー設定をクリック";
			});
		</script>
	</body>
</html>
